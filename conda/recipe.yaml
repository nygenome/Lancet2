context:
  name: lancet2
  version: "2.9.0a1" # Using an alpha semantic version explicitly for local Rattler testing

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # Mount the entire active local tree securely instead of grabbing a GitHub zip
  path: ..

build:
  number: 0
  script: |
    mkdir build && cd build
    cmake -GNinja \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_INSTALL_PREFIX=$PREFIX \
      -DLANCET_BUILD_STATIC=OFF \
      -DLANCET_ENABLE_CLOUD_IO=ON \
      ..
    ninja install -v

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - libcurl
    - openssl
    - zlib
    - bzip2
    - xz
  run:
    - libcurl
    - openssl
    - zlib
    - bzip2
    - xz

tests:
  - script:
      - Lancet2 pipeline --help

about:
  homepage: https://github.com/nygenome/Lancet2
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Lancet2 is a highly accurate somatic variant caller using localized colored de Bruijn graphs.
