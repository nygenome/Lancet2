name: Update documentation
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%F')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mike mkdocs-minify-plugin mkdocs-git-revision-date-localized-plugin

      - name: Deploy latest docs (main branch)
        if: github.ref == 'refs/heads/main'
        run: mike deploy --push latest

      - name: Deploy versioned docs (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mike deploy --push "$VERSION"
          mike set-default --push "$VERSION"
