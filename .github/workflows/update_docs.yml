name: Update Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0

      - name: Compute cache key
        run: echo "cache_id=$(date --utc '+%F')" >> $GITHUB_ENV

      - name: Restore MkDocs cache
        uses: actions/cache@v5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Deploy latest docs (main branch)
        if: github.ref == 'refs/heads/main'
        run: pixi run mike deploy --push latest

      - name: Deploy versioned docs (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          pixi run mike deploy --push "$VERSION"

      # TODO: Change default to "latest" after downstream ML scoring
      # support is integrated for newer versions (post v2.8.7).
      - name: Ensure default points to v2.8.7
        run: pixi run mike set-default --push 2.8.7
