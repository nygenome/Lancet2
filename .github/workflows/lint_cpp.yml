name: Lint C++ Sources

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Check formatting
        run: pixi run fmt-check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # Lancet2's cmake/platform_checks.cmake auto-detects ccache via
          # find_program(CCACHE_EXE ccache) and wires it as the compile/link
          # launcher when present in PATH. No project-side changes needed.
          key: lint-clang-tidy
          max-size: 500M

      - name: Build and run clang-tidy
        run: pixi run lint-check

  iwyu:
    name: include-what-you-use
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lint-iwyu
          max-size: 500M

      - name: Build and check include hygiene
        run: pixi run iwyu-check
