name: Build and Publish Conda Package

on:
  push:
    branches:
      - main

concurrency:
  group: conda-deploy
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-64
          - os: macos-latest
            platform: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute package version
        run: |
          BASE_VERSION=$(cat VERSION.txt | tr -d '[:space:]')
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          HASH=$(git rev-parse --short=10 HEAD)
          TAG=$(git describe --abbrev=0 --tags 2>/dev/null || echo "")
          DISTANCE=$(git rev-list "${TAG}..HEAD" --count 2>/dev/null || echo "0")

          # Stable release: version as-is (e.g. "2.9.0")
          # Dev build: version_branch_hash (e.g. "2.9.0_main_441d081927")
          if [ "${DISTANCE}" = "0" ]; then
            echo "LANCET_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
          else
            echo "LANCET_VERSION=${BASE_VERSION}_${BRANCH}_${HASH}" >> "$GITHUB_ENV"
          fi
          echo "LANCET_BUILD_STRING=${BRANCH}_${HASH}_0" >> "$GITHUB_ENV"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          run-install: false

      - name: Build conda package
        run: pixi exec rattler-build build --recipe conda/recipe.yaml

      - name: Upload to prefix.dev
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: pixi exec rattler-build upload prefix -c lancet2 output/**/*.conda
