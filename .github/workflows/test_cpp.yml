name: Test C++ Sources

on:
  push:
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pixi run test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # Lancet2's cmake/platform_checks.cmake auto-detects ccache via
          # find_program(CCACHE_EXE ccache) and wires it as the compile/link
          # launcher when present in PATH. No project-side changes needed —
          # just install ccache on the runner.
          key: test-cpp
          max-size: 500M

      - name: Build and run tests (Release)
        run: pixi run test
