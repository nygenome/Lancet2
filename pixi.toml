# ── Feature: profiling — isolated Python deps for CPU profile analysis ──────
#
# All profiling tasks require the -e profiling flag.
#
# Base command (all examples below):
#   pixi run -e profiling analyze-profile <profile.bin> [-- FLAGS]
#
# Single-profile views (append after --):
#   (no flags)                                all views (default)
#   --view overview                           overview
#   --view top --top 50                       top-N functions
#   --view modules                            by module
#   --view components                         by component
#   --view lines                              by source line
#   --view tree                               call tree
#   --view tree --focus "lancet::caller"      focused subtree
#   --view hotpaths                           hot paths
#   --html report.html                        static HTML report
#   --list "BuildGraph"                       source listing
#
# Same-binary diff (both profiles from the same binary):
#   --diff-base old.bin                       diff vs baseline
#   --diff-base old.bin --html d.html         diff as HTML
#
# Cross-binary diff (profiles from different binaries —
# the primary optimization workflow):
#   1. --binary old_binary --save-summary before       (save)
#   2. --binary new_binary --save-summary after        (save)
#   3. --diff-tag before after                         (diff)
#
# History:
#   --history                                 trend report

[feature.profiling.pypi-dependencies]
rich = "==15.0.0"
jinja2 = "==3.1.6"

[feature.profiling.tasks.ensure-pprof]
cmd = "GOBIN=$CONDA_PREFIX/bin go install github.com/google/pprof@latest"
description = "Install/update pprof into the profiling workspace"

[feature.profiling.tasks.analyze-profile]
cmd = "python3 scripts/analyze_profile.py {{ profile }}"
args = [{ arg = "profile", default = "" }]
depends-on = ["ensure-pprof"]
description = "Analyze a gperftools CPU profile (use -- for flags)"

# ── Feature: hts-tools — bioinformatics CLI utilities ───────────────────────
[feature.hts-tools]
channels = ["conda-forge", "bioconda"]

[feature.hts-tools.dependencies]
samtools = "==1.23.1"
bcftools = "==1.23.1"
bwa-mem2 = "==2.3"
rich = "==15.0.0"
tqdm = "==4.67.3"
pysam = "==0.24.0"
edlib = "==1.3.9"
polars = "==1.40.0"

# ── Feature: walk-palette — haplotype walk color optimization ───────────────
[feature.walk-palette]
channels = ["conda-forge", "bioconda"]

[feature.walk-palette.dependencies]
python = "==3.14.4"
numpy = "==2.4.3"
scipy = "==1.17.1"
scikit-image = "==0.26.0"
scikit-learn = "==1.8.0"

# ── Feature: test-fixtures — Scripts to generate golden test fixture TSVs ───
[feature.test-fixtures]
channels = ["conda-forge", "bioconda"]

[feature.test-fixtures.dependencies]
python = "==3.14.4"
numpy = "==2.4.3"
scipy = "==1.17.1"

# ── Environments ────────────────────────────────────────────────────────────
[environments]
profiling = { features = ["profiling"], solve-group = "default" }

hts-tools = {
  features = ["hts-tools"],
  solve-group = "hts-tools",
  no-default-feature = true
}

walk-palette = {
  features = ["walk-palette"],
  solve-group = "walk-palette",
  no-default-feature = true
}

test-fixtures = {
  features = ["test-fixtures"],
  solve-group = "test-fixtures",
  no-default-feature = true
}
